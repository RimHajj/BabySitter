name: SmartSitter Scraper

on:
  schedule:
    - cron: '0 9 * * *'   # 09:00 UTC = 18:00 JST daily
  workflow_dispatch:        # Manual trigger from GitHub UI any time

permissions:
  contents: write           # Allow the workflow to push sitters.db back to the repo

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 350    # Hard stop – full Chuo ward run can take ~3 hrs first time

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests playwright beautifulsoup4 lxml httpx
          playwright install chromium --with-deps

      - name: Run scraper
        env:
          GMAIL_ADDRESS: ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          SMARTSITTER_EMAIL: ${{ secrets.SMARTSITTER_EMAIL }}
          SMARTSITTER_PASSWORD: ${{ secrets.SMARTSITTER_PASSWORD }}
        run: python scraper.py --ward 中央区 --test

      - name: Commit updated database
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add sitters.db
          git diff --staged --quiet || git commit -m "chore: update sitters.db [skip ci]"
          git pull --rebase origin main
          git push origin main
